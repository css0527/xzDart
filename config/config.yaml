# Green Light Detector Configuration
camera_name: hikrobot
exposure_ms: 7.0
gain: 13.0
# 降低分辨率可大幅提升速度
width: 640    # 从1280降低
height: 480   # 从720降低
fps: 60       # 提高帧率
vid_pid: MV-CS016-10UC

# Image Processing Configuration
h_min: 35
h_max: 85
s_min: 100
s_max: 255
v_min: 100
v_max: 255
morph_open_size: 1    # 减小形态学核
morph_close_size: 3   # 减小形态学核
min_circularity: 0.7
min_area: 50
max_area: 10000

# Distance Calculation
real_diameter_mm: 120.0 
focal_length_pixels: 2880.0

# Serial Port Configuration
serial_port: /dev/ttyCH341USB0
serial_baudrate: 115200
serial_data_format: X:%.2f,Y:%.2f,D:%.2f

# 协议配置
serial_protocol:
  rx_header: "AA55"      # 接收帧头，十六进制字符串
  rx_footer: "55AA"      # 接收帧尾
  tx_header: "BB66"      # 发送帧头
  tx_footer: "66BB"      # 发送帧尾
  use_crc: true          # 是否使用CRC校验

# Display Configuration
show_preview: true
draw_bounding_box: true
draw_center: true
show_distance: true
show_mask: true
window_scale: 0.5

# 重投影误差: 0.0581px
camera_matrix: [1800.9674431025799, 0, 706.15394051088686, 0, 1800.5654652865528, 562.26246199310617, 0, 0, 1]
distort_coeffs: [-0.087382999180989573, 0.13100260392732885, 8.0839316930030766e-05, 0.00029970868623668725, 0]

# 相机同理想情况的偏角: yaw0.46 pitch0.61 roll-1.53 degree
R_camera2gimbal: [-0.0083195760046954614, 0.010498791137270739, 0.99991027599468041, -0.99960756138647755, -0.026835747568381807, -0.0080352891314148939, 0.026748978935305992, -0.99958472279097077, 0.010717933047771133]
t_camera2gimbal: [0.094969301833534511, 0.095006290298006682, 0.050987066291756609]